<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Drive Quest - Expo QR</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 420px;
      margin: 0 auto;
      padding: 24px;
      background: #f8fafc;
      color: #0f172a;
    }
    h1 { font-size: 1.35rem; color: #4f46e5; margin-bottom: 8px; }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(15,23,42,.08);
      border: 1px solid #e2e8f0;
    }
    img { width: 260px; height: 260px; margin: 16px 0; border-radius: 12px; }
    code {
      display: block;
      background: #eef2ff;
      color: #3730a3;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      word-break: break-all;
      margin: 12px 0;
    }
    ol { text-align: left; line-height: 1.7; padding-left: 1.2rem; }
    .warn {
      background: #fef3c7;
      color: #92400e;
      padding: 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-top: 16px;
      text-align: left;
    }
    button {
      margin-top: 12px;
      padding: 12px 20px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>
<body>
  <h1>Drive Quest 연결 QR</h1>
  <p>Expo Go 앱으로 아래 QR을 스캔하세요.</p>

  <div class="card">
    <img id="qr" alt="Expo QR Code" width="260" height="260" />
    <p><strong>연결 주소</strong></p>
    <code id="url">exp://192.168.219.106:8083</code>
    <button type="button" onclick="copyUrl()">주소 복사</button>
  </div>

  <ol>
    <li>폰에 <strong>Expo Go</strong> 설치</li>
    <li>PC·폰 <strong>같은 Wi‑Fi</strong> 연결</li>
    <li>Expo Go → <strong>Scan QR code</strong></li>
    <li>앱 실행 후 <strong>「UI 둘러보기 (mockup)」</strong> 탭</li>
  </ol>

  <div class="warn">
    ⚠️ PC에서 <code>npx expo start</code> 가 켜져 있어야 합니다 (포트 8083).
    연결이 안 되면 터미널에서 서버를 다시 시작하거나, IP가 바뀌었을 수 있습니다.
  </div>

  <script>
    const expoUrl = 'exp://192.168.219.106:8083';
    document.getElementById('url').textContent = expoUrl;
    document.getElementById('qr').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=' +
      encodeURIComponent(expoUrl);

    function copyUrl() {
      navigator.clipboard.writeText(expoUrl).then(() => alert('복사됨: ' + expoUrl));
    }
  </script>
</body>
</html>
